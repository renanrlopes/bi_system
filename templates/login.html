<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BI Gerencial — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--bdr:rgba(255,255,255,0.07);--tx:#f0f0f0;--mu:#7a7f8e;--g:#00e5a0;--r:#f43f5e;--fd:'Syne','Segoe UI',sans-serif;--fb:'DM Sans','Segoe UI','Noto Sans','Arial Unicode MS','Segoe UI Emoji','Noto Color Emoji',sans-serif;--fm:'DM Mono','Consolas','Courier New',monospace;--rd:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rd);padding:40px;width:100%;max-width:380px}
.logo{font-family:var(--fd);font-size:20px;font-weight:800;margin-bottom:4px}
.sub{font-size:12px;color:var(--mu);margin-bottom:32px}
.label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.inp{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);padding:10px 12px;font-size:13px;font-family:var(--fb);color:var(--tx);outline:none;transition:border-color .15s;margin-bottom:16px}
.inp:focus{border-color:var(--g)}
.btn{width:100%;padding:11px;background:var(--g);color:#0d0f14;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fb);transition:opacity .15s;margin-top:4px}
.btn:hover{opacity:.85}
.err{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--r);margin-bottom:16px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--g);margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="box">
  <div class="logo"><span class="dot"></span>BI Gerencial</div>
  <div class="sub">Mercado Livre · Acesso restrito</div>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="label">Usuário</div>
    <input class="inp" type="text" name="username" placeholder="seu usuário" autofocus>
    <div class="label">Senha</div>
    <input class="inp" type="password" name="password" placeholder="••••••••">
    <button class="btn" type="submit">Entrar</button>
  </form>
</div>
</body>
</html>
