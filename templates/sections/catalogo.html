<div id="page-catalogo" class="pg">
  <div class="sh">
    <div>
      <div class="st">Catálogo de Produtos</div>
      <div class="sb2">✦ Gerenciar produtos</div>
    </div>
  </div>

  <!-- Formulário de adicionar/editar produto -->
  <div class="card sec" style="background:var(--bg2);border:1px solid var(--bdr);margin-bottom:16px">
    <div class="ct">Adicionar / Editar Produto</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px">
      <div>
        <div style="font-size:10px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Categoria</div>
        <select id="cat-categoria" class="dinp">
          <option value="">— Selecionar —</option>
          <option value="Fogões & Cooktops">Fogões & Cooktops</option>
          <option value="Fornos Elétricos">Fornos Elétricos</option>
          <option value="Microondas">Microondas</option>
          <option value="Outro">Outro</option>
        </select>
      </div>
      <div>
        <div style="font-size:10px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Nome do Produto</div>
        <input id="cat-nome" class="dinp" placeholder="Ex: Fogão 5 Bocas Itatiaia">
      </div>
      <div>
        <div style="font-size:10px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Especificações</div>
        <input id="cat-specs" class="dinp" placeholder="Ex: Acend. Automático · Classe A">
      </div>
      <div>
        <div style="font-size:10px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Estoque</div>
        <input id="cat-estoque" type="number" class="dinp" placeholder="0">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px">
      <div>
        <div style="font-size:10px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">URL Foto (SVG/imagem)</div>
        <input id="cat-foto" class="dinp" placeholder="URL da imagem ou código SVG">
      </div>
      <div>
        <div style="font-size:10px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Status Estoque</div>
        <select id="cat-status" class="dinp">
          <option value="hi">Alto (verde)</option>
          <option value="md">Médio (laranja)</option>
          <option value="lo">Baixo (vermelho)</option>
        </select>
      </div>
      <div>
        <div style="font-size:10px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Preço (R$)</div>
        <input id="cat-preco" type="number" step="0.01" class="dinp" placeholder="0,00">
      </div>
      <div>
        <div style="font-size:10px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">&nbsp;</div>
        <input id="cat-id" type="hidden">
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="catSave()" class="cbtn">Salvar Produto</button>
      <button onclick="catClear()" style="padding:8px 14px;background:var(--bg3);color:var(--mu);border:1px solid var(--bdr);border-radius:var(--rs);cursor:pointer;font-size:13px;font-family:var(--fb)">Limpar</button>
    </div>
  </div>

  <!-- Tabela de produtos -->
  <div class="card sec" style="background:var(--bg2);border:1px solid var(--bdr);overflow:hidden;padding:0">
    <div style="overflow-x:auto">
      <table class="tb" style="min-width:900px">
        <thead>
          <tr>
            <th style="width:120px">Categoria</th>
            <th>Produto</th>
            <th>Especificações</th>
            <th class="r" style="width:70px">Estoque</th>
            <th class="r" style="width:90px">Preço (R$)</th>
            <th class="r" style="width:80px">Status</th>
            <th class="r" style="width:90px">Ações</th>
          </tr>
        </thead>
        <tbody id="cat-tb"></tbody>
      </table>
    </div>
  </div>

  <!-- Visualização do catálogo -->
  <div style="margin-top:24px">
    <div style="font-size:14px;font-weight:700;margin-bottom:16px">Pré-visualização do Catálogo</div>
    <div id="cat-preview" style="margin-top:16px"></div>
  </div>

  <script>
    let catProdutos = [];
    const catStorageKey = 'bi_catalogo_produtos';

    function catLoad() {
      try {
        catProdutos = JSON.parse(localStorage.getItem(catStorageKey) || '[]');
      } catch {
        catProdutos = [];
      }
      catRender();
    }

    function catSave() {
      const id = document.getElementById('cat-id').value;
      const categoria = document.getElementById('cat-categoria').value;
      const nome = document.getElementById('cat-nome').value.trim();
      const specs = document.getElementById('cat-specs').value.trim();
      const estoque = parseInt(document.getElementById('cat-estoque').value) || 0;
      const foto = document.getElementById('cat-foto').value.trim();
      const status = document.getElementById('cat-status').value;
      const preco = parseFloat(document.getElementById('cat-preco').value) || 0;

      if (!categoria || !nome) {
        alert('Preencha categoria e nome do produto');
        return;
      }

      const produto = { id: id || Date.now().toString(), categoria, nome, specs, estoque, foto, status, preco };

      if (id) {
        const idx = catProdutos.findIndex(p => p.id === id);
        if (idx >= 0) catProdutos[idx] = produto;
      } else {
        catProdutos.push(produto);
      }

      localStorage.setItem(catStorageKey, JSON.stringify(catProdutos));
      catClear();
      catRender();
    }

    function catClear() {
      document.getElementById('cat-id').value = '';
      document.getElementById('cat-categoria').value = '';
      document.getElementById('cat-nome').value = '';
      document.getElementById('cat-specs').value = '';
      document.getElementById('cat-estoque').value = '';
      document.getElementById('cat-foto').value = '';
      document.getElementById('cat-status').value = 'md';
      document.getElementById('cat-preco').value = '';
    }

    function catEdit(id) {
      const p = catProdutos.find(x => x.id === id);
      if (!p) return;
      document.getElementById('cat-id').value = p.id;
      document.getElementById('cat-categoria').value = p.categoria;
      document.getElementById('cat-nome').value = p.nome;
      document.getElementById('cat-specs').value = p.specs;
      document.getElementById('cat-estoque').value = p.estoque;
      document.getElementById('cat-foto').value = p.foto;
      document.getElementById('cat-status').value = p.status;
      document.getElementById('cat-preco').value = p.preco;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function catDelete(id) {
      if (confirm('Deletar este produto?')) {
        catProdutos = catProdutos.filter(p => p.id !== id);
        localStorage.setItem(catStorageKey, JSON.stringify(catProdutos));
        catRender();
      }
    }

    function catRender() {
      const tb = document.getElementById('cat-tb');
      tb.innerHTML = catProdutos.map(p => `
        <tr>
          <td style="font-size:11px;color:var(--mu)">${p.categoria}</td>
          <td style="font-size:12px;font-weight:500">${p.nome}</td>
          <td style="font-size:11px;color:var(--mu)">${p.specs}</td>
          <td class="r" style="font-family:var(--fm);font-size:12px">${p.estoque}</td>
          <td class="r" style="font-family:var(--fm);font-size:12px">${p.preco.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
          <td class="r"><span style="font-size:8px;font-weight:600;padding:2px 7px;border-radius:100px;background:${p.status === 'hi' ? '#e6f4e6' : p.status === 'md' ? '#fff3e0' : '#fdecea'};color:${p.status === 'hi' ? '#2a7a2a' : p.status === 'md' ? '#a05800' : '#b83232'}">${p.status === 'hi' ? 'Alto' : p.status === 'md' ? 'Médio' : 'Baixo'}</span></td>
          <td class="r" style="font-size:11px"><button onclick="catEdit('${p.id}')" style="padding:4px 8px;margin-right:4px;background:var(--b);color:white;border:none;border-radius:5px;cursor:pointer;font-size:11px">Editar</button><button onclick="catDelete('${p.id}')" style="padding:4px 8px;background:var(--r);color:white;border:none;border-radius:5px;cursor:pointer;font-size:11px">Deletar</button></td>
        </tr>
      `).join('');

      // Renderizar pré-visualização
      const preview = document.getElementById('cat-preview');
      const categorias = [...new Set(catProdutos.map(p => p.categoria))];
      
      preview.innerHTML = categorias.map(cat => `
        <div style="margin-bottom:24px">
          <div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:12px;display:flex;align-items:center;gap:8px">
            <span style="display:block;width:16px;height:2px;background:var(--o);border-radius:2px"></span>
            ${cat}
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">
            ${catProdutos.filter(p => p.categoria === cat).map(p => {
              const bgColor = p.status === 'hi' ? '#e6f4e6' : p.status === 'md' ? '#fff3e0' : '#fdecea';
              const txtColor = p.status === 'hi' ? '#2a7a2a' : p.status === 'md' ? '#a05800' : '#b83232';
              return `
                <div class="card" style="padding:0;overflow:hidden;background:var(--bg3);border:1px solid var(--bdr)">
                  <div style="width:100%;aspect-ratio:4/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--bdr);overflow:hidden;position:relative">
                    ${p.foto.startsWith('<svg') ? p.foto : `<img src="${p.foto}" style="width:80%;height:80%;object-fit:contain" onerror="this.style.display='none'">`}
                    <span style="position:absolute;top:6px;right:6px;font-size:8px;font-weight:600;padding:2px 7px;border-radius:100px;background:${bgColor};color:${txtColor}">Estoque: ${p.estoque}</span>
                  </div>
                  <div style="padding:8px 10px">
                    <div style="font-size:10px;font-weight:500;color:var(--tx);line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${p.nome}</div>
                    <div style="font-size:9px;color:var(--mu);font-weight:300">${p.specs}</div>
                    ${p.preco > 0 ? `<div style="font-size:10px;color:var(--g);font-weight:500;margin-top:4px">R$ ${p.preco.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>` : ''}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `).join('');
    }

    // Carregar dados ao inicializar
    catLoad();
  </script>
</div>
