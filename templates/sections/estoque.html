<div class="pg" id="page-estoque">
    <div class="sh">
      <div class="st" id="est-title">Estoque Full</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <div style="display:flex;gap:3px;background:var(--bg3);border-radius:var(--rs);padding:3px" id="est-filter">
          <button class="mt on" onclick="fEst('all',this)">Todos</button>
          <button class="mt" onclick="fEst('ok',this)">Boa qualidade</button>
          <button class="mt" onclick="fEst('imp',this)">Impulsionar</button>
        </div>
        <button class="cbtn" onclick="estSave()">Salvar estoque</button>
      </div>
    </div>
    <div class="kg" id="kpi-est"></div>
    <div class="card sec" style="padding:0;overflow:hidden">
      <div style="overflow-x:auto">
        <table class="tb" id="est-tb" style="min-width:700px">
          <thead>
            <tr>
              <th style="min-width:150px">SKU</th>
              <th>Produto</th>
              <th class="r" style="width:90px">Entrada<br>Pendente</th>
              <th class="r" style="width:90px">Boa<br>Qualidade</th>
              <th class="r" style="width:70px">Vendas<br>30d</th>
              <th style="width:120px;text-align:center">Tempo Estoque</th>
              <th style="width:90px;text-align:center">Status</th>
            </tr>
          </thead>
          <tbody id="est-body"></tbody>
        </table>
      </div>
    </div>
  </div>
