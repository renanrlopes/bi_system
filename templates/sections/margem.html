<div class="pg" id="page-margem">

        <div style="display:flex;gap:3px;background:var(--bg3);border-radius:var(--rs);padding:3px">

          <button class="mt" onclick="fMarg('ok',this)">Positiva</button>

              <th class="r">Mg. Líquida</th>

              <th class="r">V30</th>
              <th class="r">Giro<br>(dias)</th>
              <th class="r">ROI<br>mensal</th>

          <tbody id="marg-body"></tbody>
        </table>
      </div>
    </div>
  </div>
